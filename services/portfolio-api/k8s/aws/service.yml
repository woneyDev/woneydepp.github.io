apiVersion: v1
kind: Service
metadata:
  name: portfolio-api-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: portfolio-api
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8080
  type: LoadBalancer
