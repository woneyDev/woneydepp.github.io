apiVersion: v1
kind: Service
metadata:
  name: data-service-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: data-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8080
  type: LoadBalancer
